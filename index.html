<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石虎保育官：里山任務行動 V5</title>
    <style>
        :root {
            --primary: #4A7c59; /* 森林綠 */
            --secondary: #c89f5d; /* 大地木色 */
            --bg: #f8f5f0;
            --card-bg: #ffffff;
            --text: #334155;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Microsoft JhengHei", -apple-system, sans-serif;
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            color: var(--text);
        }

        /* 核心容器：電腦平板置中，手機填滿 */
        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        /* 頂部狀態列 */
        header {
            padding: 15px 20px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-title { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
        .progress-tag { font-size: 0.8rem; background: var(--bg); padding: 4px 10px; border-radius: 20px; font-weight: bold; }

        /* 主要內容區：可捲動 */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .screen { display: none; height: 100%; }
        .screen.active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 遊戲元素樣式 */
        .game-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            transition: background-color 0.4s;
        }

        .cat-visual {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin-bottom: 15px;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cat-happy { transform: scale(1.2); }
        .cat-sad { transform: scale(0.8); filter: grayscale(0.5); }

        .purr-bubble {
            position: absolute; top: 0; right: 20%;
            background: #fdf2f8; color: #db2777; font-size: 14px;
            padding: 5px 12px; border-radius: 15px; font-weight: bold;
            opacity: 0; transition: opacity 0.3s;
        }

        .cat-happy .purr-bubble { opacity: 1; animation: bounce 1s infinite; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .question-text { font-size: 1.1rem; font-weight: bold; line-height: 1.5; margin-bottom: 15px; border-left: 5px solid var(--primary); padding-left: 15px; }
        .context-text { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; }

        /* 按鈕區固定在下方 */
        .action-area {
            padding: 20px;
            background: #fff;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-outline { background-color: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn:active { transform: scale(0.97); }

        /* 回饋區樣式 */
        .feedback-box {
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            display: none;
        }

        .feedback-correct { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .feedback-wrong { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        /* 樓層指引畫面 */
        .transition-screen {
            text-align: center;
            justify-content: center;
        }

        .floor-icon { font-size: 50px; margin-bottom: 20px; }
        .map-line { height: 4px; background: #cbd5e1; width: 100px; margin: 20px auto; position: relative; }
        .map-dot { width: 12px; height: 12px; background: var(--primary); border-radius: 50%; position: absolute; top: -4px; animation: move 2s infinite; }

        @keyframes move { 0% { left: 0; } 100% { left: 100%; } }

        /* 存摺頁面 */
        .item-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .status-done { background: #dcfce7; color: #166534; }
        .status-none { background: #f1f5f9; color: #64748b; }

        /* 底部導覽列 */
        nav {
            height: 65px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            flex-shrink: 0;
        }

        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; color: #94a3b8; cursor: pointer; }
        .nav-tab.active { color: var(--primary); font-weight: bold; }
        .nav-icon { font-size: 1.2rem; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <header>
        <div class="header-title" id="top-title">里山任務行動</div>
        <div class="progress-tag" id="top-progress">2F 接待區</div>
    </header>

    <main id="main-content">
        
        <!-- 開始畫面 -->
        <div id="screen-start" class="screen active" style="justify-content: center; text-align: center;">
            <div style="font-size: 100px;">🐆</div>
            <h1 style="color: var(--primary); margin-bottom: 10px;">石虎保育官</h1>
            <p style="color: #64748b; margin-bottom: 30px;">跟著國土綠網計畫，從農田、溪流到森林，幫助野生動物平安回家。</p>
            <button class="btn btn-primary" id="btn-start-game">🚀 開始冒險</button>
            <button class="btn btn-outline" id="btn-start-passbook">📖 查看里山存摺</button>
        </div>

        <!-- 樓層轉場 -->
        <div id="screen-transition" class="screen transition-screen">
            <div class="floor-icon" id="trans-icon">👣</div>
            <h2 id="trans-title">正在前往下一個展區</h2>
            <div class="map-line"><div class="map-dot"></div></div>
            <p id="trans-msg" style="color: #64748b;">請跟著指示牌移動...</p>
            <button class="btn btn-primary" id="btn-trans-next" style="margin-top: 20px;">我已抵達，開始探索</button>
        </div>

        <!-- 問答挑戰區 -->
        <div id="screen-question" class="screen">
            <div id="scene-wrapper" class="game-card">
                <div class="cat-visual" id="cat-body">
                    🐆<div class="purr-bubble">Purr~🎵</div>
                </div>
                <div class="context-text" id="q-context">情境載入中...</div>
                <div class="question-text" id="q-body">正在獲取任務問題...</div>
            </div>
            <div id="feedback" class="feedback-box"></div>
        </div>

        <!-- 存摺區 -->
        <div id="screen-passbook" class="screen">
            <h2 style="margin-top: 0;">里山存摺</h2>
            <div class="item-card">
                <div><strong>🌿 綠網生態挑戰 (A)</strong><br><small>完成四種生物保育任務</small></div>
                <span class="status-pill status-none" id="st-a">未達成</span>
            </div>
            <div class="item-card">
                <div><strong>⛰️ 火炎山步道 (B)</strong><br><small>步道口拍照打卡</small></div>
                <span class="status-pill status-none" id="st-b">未達成</span>
            </div>
            <div class="item-card">
                <div><strong>🏘️ 木雕街特約店 (C)</strong><br><small>消費掃碼</small></div>
                <span class="status-pill status-none" id="st-c">未達成</span>
            </div>
            <div style="background: #fff; padding: 15px; border-radius: 12px; margin-top: 10px; border: 2px dashed var(--secondary);">
                <strong style="color: var(--secondary);">🎁 可兌換禮品：</strong>
                <div id="reward-msg" style="margin-top:10px; font-size: 0.9rem;">(請先完成綠網生態挑戰解鎖)</div>
            </div>
        </div>

    </main>

    <!-- 固定於底部的按鈕區 -->
    <div class="action-area" id="footer-actions">
        <div id="option-btns">
            <button class="btn btn-outline" id="opt-0">選項 A</button>
            <button class="btn btn-outline" id="opt-1">選項 B</button>
        </div>
        <button class="btn btn-primary" id="btn-next" style="display: none;">繼續前進</button>
    </div>

    <!-- 底部導航 -->
    <nav>
        <div class="nav-tab active" id="nav-home"><div class="nav-icon">🧭</div>冒險</div>
        <div class="nav-tab" id="nav-passbook"><div class="nav-icon">📖</div>存摺</div>
        <div class="nav-tab" id="nav-help"><div class="nav-icon">ℹ️</div>求助</div>
    </nav>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const gameData = [
            { type: 'transition', targetFloor: '1F 農田濕地區', icon: '🌾', msg: '請前往 1 樓，了解里山農田的泥水隱士。' },
            { 
                type: 'quiz', floor: '1F 農田濕地區', title: '【泥水家園的危機】',
                context: '水田裡有一條腹部帶著美麗橘紅色的「赤腹游蛇」正在尋找小魚。',
                q: '「為拯救這群極度瀕危的泥水隱士，國土綠網計畫採取了什麼行動？」',
                options: [{t: '(A) 把水溝鋪滿水泥並移至水族箱飼養', c:false}, {t:'(B) 保留泥土護岸，引導轉型友善農作', c:true}],
                ok: '太棒了！泥土護岸和無毒環境讓赤腹游蛇有了避難所，這正是編織「里山農田濕地」的重要一步！',
                tip: '其實...水泥化會讓赤腹游蛇無法躲藏，人工飼養無法真正解決野外滅絕危機。請試試看更友善環境的方法吧！',
                emoji: '🐍'
            },
            { type: 'transition', targetFloor: '2F 高山溪流區', icon: '🐟', msg: '跟著溪流往上走！請前往 2 樓了解國寶魚的挑戰。' },
            { 
                type: 'quiz', floor: '2F 高山溪流區', title: '【國寶魚的逆流挑戰】',
                context: '櫻花鉤吻鮭準備逆流產卵，卻被幾公尺高的「防洪攔砂壩」截斷去路。',
                q: '「國土綠網講求『川』的橫向串聯，要如何幫助被阻隔的鮭魚回家？」',
                options: [{t: '(A) 進行生態改善為階梯狀「魚道」', c:true}, {t:'(B) 派人拿網子撈起，人工搬家送到壩頂', c:false}],
                ok: '賓果！拆除舊壩或改良魚道，成功打通了溪流的血管，讓溪流生態系的基因能健康交流！',
                tip: '其實...人工搬家耗時耗力，且容易讓珍貴的國寶魚受傷生病，不是長久之計喔。',
                emoji: '🐟'
            },
            { type: 'transition', targetFloor: '3F 淺山山林區', icon: '🌲', msg: '走進森林邊緣，前往 3 樓尋找害羞的森林居民。' },
            { 
                type: 'quiz', floor: '3F 淺山山林區', title: '【山羌的森林迷宮】',
                context: '人類開闢的新果園與硬鐵絲網，把森林切成迷宮。山羌逃跑時容易卡在網上...',
                q: '「在國土綠網計畫中，我們要怎麼在果園與野生動物之間取得平衡？」',
                options: [{t: '(A) 用剛硬的刀片鐵絲網徹底阻絕動物', c:false}, {t:'(B) 鼓勵改用「綠籬」或預留通道的友善圍網', c:true}],
                ok: '沒錯！友善圍網既能保護作物，又能當作山羌的安全走廊，讓山羌安心穿梭！',
                tip: '其實...這樣做會徹底切斷山羌的逃生路線，棲地更加破碎，也更容易讓牠們陷入絕境喔。',
                emoji: '🦌'
            },
            { type: 'transition', targetFloor: '1F 生態廊道區', icon: '🐆', msg: '回到淺山交界處，準備完成最後的關鍵任務！' },
            { 
                type: 'quiz', floor: '1F 生態廊道區', title: '【石虎的平安回家路】',
                context: '小石虎準備穿越拓寬的柏油馬路前往對側樹林，前面是呼嘯而過的車輛。',
                q: '「我們該如何運用計畫的『友善廊道』，幫石虎打造平安回家的路？」',
                options: [{t: '(A) 建置「動物專用天橋」或「地下涵洞」', c:true}, {t:'(B) 在路邊播放警報喇叭嚇跑石虎', c:false}],
                ok: '完美的解答！透過天橋、地下涵洞與圍網，石虎不需要走上柏油路就能安全抵達對面！',
                tip: '其實...驚嚇野生動物可能讓牠們因為恐慌而直接衝進車道，會更加危險喔！',
                emoji: '🐆'
            }
        ];

        let step = -1;
        let museumClear = false;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            if(id === 'screen-question' || id === 'screen-narrative') {
                document.getElementById('footer-actions').style.display = 'block';
            } else {
                document.getElementById('footer-actions').style.display = 'none';
            }
        }

        function updateUI() {
            const data = gameData[step];
            const topTitle = document.getElementById('top-title');
            const topProgress = document.getElementById('top-progress');

            if(data.type === 'transition') {
                showScreen('screen-transition');
                document.getElementById('trans-title').innerText = `正前往 ${data.targetFloor}`;
                document.getElementById('trans-icon').innerText = data.icon;
                document.getElementById('trans-msg').innerText = data.msg;
                topProgress.innerText = '移動中...';
            } 
            else if(data.type === 'quiz') {
                showScreen('screen-question');
                topTitle.innerText = data.title;
                topProgress.innerText = data.floor;
                
                document.getElementById('q-context').innerText = data.context;
                document.getElementById('q-body').innerText = data.q;
                document.getElementById('opt-0').innerText = data.options[0].t;
                document.getElementById('opt-1').innerText = data.options[1].t;
                
                document.getElementById('option-btns').style.display = 'block';
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('feedback').style.display = 'none';
                document.getElementById('opt-0').disabled = false;
                document.getElementById('opt-1').disabled = false;
                
                // 動態替換動物 Emoji
                const animalEmoji = data.emoji || '🐆';
                document.getElementById('cat-body').innerHTML = `${animalEmoji}<div class="purr-bubble">Hi~🎵</div>`;
                document.getElementById('cat-body').className = 'cat-visual';
            }
        }

        function handleChoice(idx) {
            const data = gameData[step];
            const isCorrect = data.options[idx].c;
            const feedback = document.getElementById('feedback');
            const cat = document.getElementById('cat-body');

            feedback.style.display = 'block';
            
            if(isCorrect) {
                feedback.className = 'feedback-box feedback-correct';
                feedback.innerHTML = `<strong>🏆 太棒了！</strong><br>${data.ok}`;
                cat.className = 'cat-visual cat-happy';
                document.getElementById('option-btns').style.display = 'none';
                document.getElementById('btn-next').style.display = 'block';
                document.getElementById('btn-next').innerText = (step === gameData.length - 1) ? '完成冒險 🏁' : '繼續前進';
            } else {
                feedback.className = 'feedback-box feedback-wrong';
                feedback.innerHTML = `<strong>⚠️ 其實...</strong><br>${data.tip}`;
                cat.className = 'cat-visual cat-sad';
                document.getElementById(`opt-${idx}`).disabled = true;
            }
            setTimeout(() => {
                const main = document.getElementById('main-content');
                main.scrollTo({ top: main.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function finishGame() {
            museumClear = true;
            alert("恭喜完成綠網生態挑戰！請查看里山存摺。");
            document.getElementById('st-a').innerText = '已達成';
            document.getElementById('st-a').className = 'status-pill status-done';
            document.getElementById('reward-msg').innerHTML = "🎟️ 兌換代碼：GREEN-NET-2024<br>請至 1F 櫃台領取限量紀念品。";
            showScreen('screen-passbook');
            updateNav('nav-passbook');
        }

        function updateNav(activeId) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(activeId).classList.add('active');
        }

        document.getElementById('btn-start-game').addEventListener('click', () => { step = 0; updateUI(); });
        document.getElementById('btn-start-passbook').addEventListener('click', () => { showScreen('screen-passbook'); updateNav('nav-passbook'); });
        document.getElementById('btn-trans-next').addEventListener('click', () => { step++; updateUI(); });
        
        document.getElementById('opt-0').addEventListener('click', () => handleChoice(0));
        document.getElementById('opt-1').addEventListener('click', () => handleChoice(1));
        
        document.getElementById('btn-next').addEventListener('click', () => {
            if(step === gameData.length - 1) finishGame();
            else { step++; updateUI(); }
        });

        document.getElementById('nav-home').addEventListener('click', () => {
            if(step === -1) showScreen('screen-start');
            else updateUI();
            updateNav('nav-home');
        });
        document.getElementById('nav-passbook').addEventListener('click', () => {
            showScreen('screen-passbook');
            updateNav('nav-passbook');
        });
        document.getElementById('nav-help').addEventListener('click', () => {
            alert('如有操作問題，請尋問各樓層工作人員獲取幫助！');
        });
    });
</script>

</body>
</html>
