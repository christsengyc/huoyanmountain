<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石虎保育官：里山任務行動</title>
    <style>
        /* 全局與重置 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f9f4; color: #333; display: flex; justify-content: center; }
        
        /* 手機版型容器 */
        #app { width: 100%; max-width: 480px; background-color: #fff; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1); padding-bottom: 60px; overflow-x: hidden; }
        
        /* 隱藏區塊用 */
        .hidden { display: none !important; }

        /* 頂部標題 */
        .header { background-color: #2e7d32; color: white; text-align: center; padding: 15px; font-size: 1.2rem; font-weight: bold; }

        /* 歡迎頁面 */
        #start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; padding: 20px; text-align: center; }
        #start-screen h1 { color: #2e7d32; margin-bottom: 10px; }
        #start-screen p { color: #555; margin-bottom: 30px; line-height: 1.6; }
        .hero-icon { font-size: 80px; margin-bottom: 20px; }

        /* 按鈕樣式 */
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background-color: #4caf50; color: white; }
        .btn-primary:hover { background-color: #388e3c; }
        .btn-outline { background-color: white; color: #4caf50; border: 2px solid #4caf50; }
        .btn-outline:hover { background-color: #e8f5e9; }
        
        /* 內容區塊 */
        .content { padding: 20px; }
        .story-box { background-color: #e8f5e9; padding: 15px; border-left: 5px solid #2e7d32; border-radius: 4px; margin-bottom: 20px; line-height: 1.6; }
        .question-box h3 { margin-bottom: 15px; color: #2e7d32; }
        
        /* 選項按鈕 */
        .option-btn { display: block; width: 100%; text-align: left; background-color: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; line-height: 1.4; }
        .option-btn:hover { background-color: #f1f1f1; }
        .option-btn.correct { background-color: #c8e6c9; border-color: #4caf50; }
        .option-btn.wrong { background-color: #ffcdd2; border-color: #f44336; }

        /* 回饋訊息區 */
        #feedback-area { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; }
        .feedback-correct { background-color: #e8f5e9; color: #2e7d32; }
        .feedback-wrong { background-color: #ffebee; color: #c62828; }

        /* 存摺區塊 (卡片網格) */
        .passbook-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .animal-card { background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; filter: grayscale(100%); opacity: 0.5; transition: 0.3s; }
        .animal-card.unlocked { filter: grayscale(0%); opacity: 1; border-color: #4caf50; background-color: #e8f5e9; }
        .animal-card .emoji { font-size: 40px; margin-bottom: 10px; }
        .animal-card h4 { margin: 5px 0; color: #2e7d32; }

        /* 底部導覽列 */
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background-color: #fff; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { text-align: center; color: #777; cursor: pointer; flex: 1; font-size: 0.9rem; }
        .nav-item.active { color: #2e7d32; font-weight: bold; }
        .nav-icon { display: block; font-size: 1.4rem; margin-bottom: 3px; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">石虎保育官：里山任務行動</div>

    <!-- 歡迎頁面 -->
    <div id="start-screen">
        <div class="hero-icon">🐾</div>
        <h1>成為里山的守護者</h1>
        <p>跟著國土綠網計畫，從農田、溪流到森林，縫補破碎的棲地，幫助野生動物平安回家。</p>
        <button class="btn btn-primary" onclick="startGame()">🚀 開始冒險</button>
        <button class="btn btn-outline" onclick="switchTab('passbook')">📖 查看里山存摺</button>
    </div>

    <!-- 主應用畫面 (含導覽列切換) -->
    <div id="main-screen" class="hidden">
        
        <!-- 冒險任務區 -->
        <div id="tab-adventure" class="content">
            <h2 id="level-title" style="color: #2e7d32; margin-bottom: 10px;">任務關卡</h2>
            <div id="story-container" class="story-box"></div>
            
            <div class="question-box">
                <h3 id="question-text"></h3>
                <div id="options-container"></div>
            </div>

            <div id="feedback-area" class="hidden"></div>
            <button id="next-btn" class="btn btn-primary hidden" onclick="nextQuestion()" style="margin-top: 15px;">➡️ 繼續前進</button>
        </div>

        <!-- 里山存摺區 -->
        <div id="tab-passbook" class="content hidden">
            <h2 style="color: #2e7d32;">里山生物圖鑑</h2>
            <p style="color: #666; margin-top: 10px;">完成冒險任務，解鎖生態綠網中的明星物種！</p>
            <div class="passbook-grid">
                <div class="animal-card" id="card-0"><div class="emoji">🐍</div><h4>赤腹游蛇</h4><small>里：農田濕地</small></div>
                <div class="animal-card" id="card-1"><div class="emoji">🐟</div><h4>櫻花鉤吻鮭</h4><small>川：高山溪流</small></div>
                <div class="animal-card" id="card-2"><div class="emoji">🦌</div><h4>山羌</h4><small>森：淺山山林</small></div>
                <div class="animal-card" id="card-3"><div class="emoji">🐆</div><h4>石虎</h4><small>交界：生態廊道</small></div>
            </div>
        </div>

        <!-- 求助區 -->
        <div id="tab-help" class="content hidden">
            <h2 style="color: #2e7d32;">ℹ️ 任務求助與資訊</h2>
            <div class="story-box" style="margin-top: 15px;">
                <p><strong>什麼是國土綠網？</strong></p>
                <p>人類的開發讓野生動物的家變得破碎。國土綠網計畫就是要透過「森、川、里、海」的串聯，建立動物通道、推廣友善農作，重新編織這張生態保護網。</p>
            </div>
        </div>

        <!-- 底部導覽列 -->
        <div class="bottom-nav">
            <div class="nav-item active" id="nav-adventure" onclick="switchTab('adventure')">
                <span class="nav-icon">🧭</span>冒險
            </div>
            <div class="nav-item" id="nav-passbook" onclick="switchTab('passbook')">
                <span class="nav-icon">📖</span>存摺
            </div>
            <div class="nav-item" id="nav-help" onclick="switchTab('help')">
                <span class="nav-icon">ℹ️</span>求助
            </div>
        </div>
    </div>
</div>

<script>
    // 題庫資料 (四種生物)
    const quizData = [
        {
            title: "任務一：赤腹游蛇的泥水家園",
            story: "保育官，快看水田裡！有一條腹部帶著美麗橘紅色的「赤腹游蛇」正在尋找小魚。牠們曾經是常見的稻田夥伴，但因為埤塘水泥化、農藥使用，數量暴跌，變得比石虎還稀少！",
            question: "為了拯救這群極度瀕危的「泥水隱士」，國土綠網計畫採取了什麼行動？",
            options: [
                { text: "選項 A：把水溝和埤塘鋪上好整理的水泥，將蛇移到水族箱飼養。", correct: false, feedback: "噢不！水泥化會讓赤腹游蛇無法躲藏，人工飼養無法解決野外滅絕危機。" },
                { text: "選項 B：保留泥土護岸與在地挺水植物，引導農民轉型「友善農作」。", correct: true, feedback: "太棒了！泥土護岸和無毒環境讓赤腹游蛇有了避難所，這正是「里山農田濕地」的重要一步！" }
            ]
        },
        {
            title: "任務二：櫻花鉤吻鮭的逆流挑戰",
            story: "我們來到高海拔溪流源頭。國寶魚「櫻花鉤吻鮭」準備逆流產卵，卻被幾公尺高的「防洪攔砂壩」截斷去路，只能撞牆摔落，家族被迫孤立...",
            question: "國土綠網講求「川」的橫向串聯。要如何幫助被阻隔的鮭魚回家？",
            options: [
                { text: "選項 A：進行「生態改善」，將高壩改成階梯狀「魚道」或評估拆除舊壩。", correct: true, feedback: "賓果！拆除舊壩或改良魚道，成功打通了溪流的血管，讓溪流生態系的基因能健康交流！" },
                { text: "選項 B：每年繁殖期到了，派人拿網子把魚撈起來，人工搬家送到壩頂。", correct: false, feedback: "人工搬家耗時耗力，且容易讓珍貴的國寶魚受傷生病，不是長久之計喔。" }
            ]
        },
        {
            title: "任務三：山羌的森林迷宮",
            story: "汪！汪！傳來像狗叫的警戒聲，原來是害羞的「山羌」。人類開闢新道路與果園的硬鐵絲網，把森林切成迷宮。山羌逃跑時容易卡在網上，或被遊蕩犬攻擊...",
            question: "在國土綠網計畫中，我們要怎麼在果園與野生動物之間取得平衡？",
            options: [
                { text: "選項 A：用剛硬的刀片鐵絲網將果園圍得更死，徹底阻絕動物接觸。", correct: false, feedback: "這樣做會徹底切斷山羌的逃生路線，棲地更加破碎，也更容易被遊蕩犬包抄。" },
                { text: "選項 B：鼓勵改用「綠籬」或友善圍網預留通道，並加強遊蕩犬隻管理。", correct: true, feedback: "沒錯！友善圍網既能保護作物，又能當作山羌的安全走廊，讓山羌安心穿梭！" }
            ]
        },
        {
            title: "任務四：石虎的平安回家路",
            story: "回到苗栗淺山，小「石虎」準備穿越拓寬的柏油馬路前往對側樹林。前面是呼嘯而過的車輛，如果直接衝過去，很可能成為下一個「路殺」受害者。",
            question: "我們該如何運用計畫的「友善廊道」，幫石虎打造一條平安回家的路？",
            options: [
                { text: "選項 A：建置「動物專用天橋」或「地下涵洞」，並架設防護圍網引導石虎。", correct: true, feedback: "完美的解答！透過天橋、地下涵洞與圍網，石虎不需要走上柏油路就能安全抵達對面！" },
                { text: "選項 B：在路邊播放警報喇叭嚇走石虎，讓牠永遠不要想過馬路。", correct: false, feedback: "驚嚇野生動物可能讓牠們因為恐慌而直接衝進車道，會更加危險喔！" }
            ]
        }
    ];

    let currentQuestionIndex = 0;
    let unlockedAnimals = [false, false, false, false];

    // 開始遊戲
    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        currentQuestionIndex = 0;
        loadQuestion();
        switchTab('adventure');
    }

    // 載入題目
    function loadQuestion() {
        if (currentQuestionIndex >= quizData.length) {
            // 全部完成
            document.getElementById('level-title').innerText = "🏆 任務全部完成！";
            document.getElementById('story-container').innerHTML = "<b>太棒了！保育官！</b><br>你已成功編織國土綠網，拯救了里山環境中的珍貴動物。快去查看你的里山存摺吧！";
            document.getElementById('question-text').innerText = "";
            document.getElementById('options-container').innerHTML = "";
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            return;
        }

        const data = quizData[currentQuestionIndex];
        document.getElementById('level-title').innerText = data.title;
        document.getElementById('story-container').innerText = data.story;
        document.getElementById('question-text').innerText = data.question;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = ''; // 清空選項
        
        data.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(btn, opt.correct, opt.feedback);
            optionsContainer.appendChild(btn);
        });

        // 重置狀態
        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
    }

    // 選擇選項邏輯
    function selectOption(btnElement, isCorrect, feedbackText) {
        // 停用所有按鈕
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.style.pointerEvents = 'none');

        const feedbackArea = document.getElementById('feedback-area');
        feedbackArea.classList.remove('hidden', 'feedback-correct', 'feedback-wrong');

        if (isCorrect) {
            btnElement.classList.add('correct');
            feedbackArea.classList.add('feedback-correct');
            feedbackArea.innerHTML = "✅ <b>正確！</b><br>" + feedbackText;
            
            // 解鎖存摺圖鑑
            unlockedAnimals[currentQuestionIndex] = true;
            document.getElementById(`card-${currentQuestionIndex}`).classList.add('unlocked');
            
            document.getElementById('next-btn').classList.remove('hidden');
        } else {
            btnElement.classList.add('wrong');
            feedbackArea.classList.add('feedback-wrong');
            feedbackArea.innerHTML = "❌ <b>答錯囉！</b><br>" + feedbackText + "<br><br><small>請點擊下方按鈕重新選擇。</small>";
            
            // 允許重新作答
            const retryBtn = document.createElement('button');
            retryBtn.className = 'btn btn-outline';
            retryBtn.style.marginTop = '10px';
            retryBtn.innerText = '🔄 再試一次';
            retryBtn.onclick = () => loadQuestion();
            feedbackArea.appendChild(retryBtn);
        }
    }

    // 下一題
    function nextQuestion() {
        currentQuestionIndex++;
        loadQuestion();
    }

    // 切換底部導覽標籤
    function switchTab(tabName) {
        // 隱藏所有內容
        document.getElementById('tab-adventure').classList.add('hidden');
        document.getElementById('tab-passbook').classList.add('hidden');
        document.getElementById('tab-help').classList.add('hidden');
        
        // 移除導覽列 active 狀態
        document.getElementById('nav-adventure').classList.remove('active');
        document.getElementById('nav-passbook').classList.remove('active');
        document.getElementById('nav-help').classList.remove('active');

        // 顯示被選中的內容
        document.getElementById(`tab-${tabName}`).classList.remove('hidden');
        document.getElementById(`nav-${tabName}`).classList.add('active');
    }
</script>

</body>
</html>
